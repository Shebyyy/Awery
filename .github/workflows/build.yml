name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        default: ''

jobs:
  build-android:
    name: Build Android APKs
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Android Release APK (Universal)
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Build Android App Bundle (AAB)
        run: ./gradlew :app:bundleRelease --stacktrace
        continue-on-error: true

      - name: Sign APKs (if keystore available)
        run: |
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 -d > keystore.jks
          ./gradlew :app:assembleRelease \
            -Pandroid.injected.signing.store.file=$PWD/keystore.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
        continue-on-error: true

      - name: Collect Android artifacts
        run: |
          mkdir -p android-artifacts
          # Find all APK files (includes universal and architecture-specific splits)
          find app/build/outputs/apk/release -name "*.apk" -type f -exec cp {} android-artifacts/ \;
          # Find AAB files if they exist
          find app/build/outputs/bundle/release -name "*.aab" -type f -exec cp {} android-artifacts/ \; || true
          echo "=== Android Artifacts Found ==="
          ls -lah android-artifacts/

      - name: Rename APKs with version
        run: |
          cd android-artifacts
          VERSION="${GITHUB_REF#refs/tags/}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$GITHUB_REF" ]; then
            VERSION="${{ github.event.inputs.version }}"
          fi
          if [ -z "$VERSION" ]; then
            VERSION="dev-$(date +%Y%m%d)"
          fi
          
          echo "=== Renaming artifacts with version: $VERSION ==="
          
          for file in *.apk *.aab; do
            if [ -f "$file" ]; then
              # Extract architecture from filename if present
              if [[ "$file" == *"arm64-v8a"* ]]; then
                new_name="Awery-${VERSION}-arm64-v8a.apk"
              elif [[ "$file" == *"armeabi-v7a"* ]]; then
                new_name="Awery-${VERSION}-armeabi-v7a.apk"
              elif [[ "$file" == *"x86_64"* ]]; then
                new_name="Awery-${VERSION}-x86_64.apk"
              elif [[ "$file" == *"x86"* ]]; then
                new_name="Awery-${VERSION}-x86.apk"
              elif [[ "$file" == *"universal"* ]]; then
                new_name="Awery-${VERSION}-universal.apk"
              elif [[ "$file" == *".aab" ]]; then
                new_name="Awery-${VERSION}.aab"
              else
                # Default naming for release APK
                new_name="Awery-${VERSION}-universal.apk"
              fi
              
              echo "Renaming: $file -> $new_name"
              mv "$file" "$new_name"
            fi
          done
          
          echo "=== Final artifacts ==="
          ls -lah

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: android-artifacts/
          retention-days: 7

  build-desktop-linux:
    name: Build Desktop (Linux)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Desktop Linux
        run: ./gradlew :app:packageDistributionForCurrentOS --stacktrace

      - name: Create Linux package variants
        run: |
          ./gradlew :app:packageDeb --stacktrace || echo "Deb packaging not available"
          ./gradlew :app:packageRpm --stacktrace || echo "RPM packaging not available"
        continue-on-error: true

      - name: Collect Linux artifacts
        run: |
          mkdir -p desktop-linux-artifacts
          find app/build/compose/binaries -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.tar.gz" \) -exec cp {} desktop-linux-artifacts/ \;
          find app/build/compose/jars -name "*.jar" -type f -exec cp {} desktop-linux-artifacts/ \;
          ls -lah desktop-linux-artifacts/

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-artifacts
          path: desktop-linux-artifacts/
          retention-days: 7

  build-desktop-windows:
    name: Build Desktop (Windows)
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build Desktop Windows
        run: ./gradlew :app:packageDistributionForCurrentOS --stacktrace
        shell: bash

      - name: Create Windows installer
        run: ./gradlew :app:packageMsi --stacktrace || echo "MSI packaging not available"
        shell: bash
        continue-on-error: true

      - name: Collect Windows artifacts
        run: |
          mkdir -p desktop-windows-artifacts
          Get-ChildItem -Path app/build/compose/binaries -Recurse -Include *.exe,*.msi,*.zip | Copy-Item -Destination desktop-windows-artifacts/
          Get-ChildItem desktop-windows-artifacts/
        shell: powershell

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-artifacts
          path: desktop-windows-artifacts/
          retention-days: 7

  build-desktop-macos:
    name: Build Desktop (macOS)
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Desktop macOS
        run: ./gradlew :app:packageDistributionForCurrentOS --stacktrace

      - name: Create macOS DMG
        run: ./gradlew :app:packageDmg --stacktrace || echo "DMG packaging not available"
        continue-on-error: true

      - name: Collect macOS artifacts
        run: |
          mkdir -p desktop-macos-artifacts
          find app/build/compose/binaries -type f \( -name "*.dmg" -o -name "*.pkg" \) -exec cp {} desktop-macos-artifacts/ \;
          ls -lah desktop-macos-artifacts/

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos-artifacts
          path: desktop-macos-artifacts/
          retention-days: 7

  create-release:
    name: Create GitHub Release
    needs: [build-android, build-desktop-linux, build-desktop-windows, build-desktop-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Display artifact structure
        run: |
          ls -R release-artifacts/

      - name: Get version from tag or input
        id: get_version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$GITHUB_REF" ]; then
            VERSION="${{ github.event.inputs.version }}"
          fi
          if [ -z "$VERSION" ]; then
            VERSION="dev-$(date +%Y%m%d-%H%M%S)"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

      - name: Generate release notes
        id: release_notes
        run: |
          cat << EOF > release_notes.md
          ## Awery ${{ steps.get_version.outputs.VERSION }}
          
          ### 📦 Available Downloads
          
          #### Android
          - **Universal APK**: `Awery-*-universal.apk` - Works on all Android devices (larger file size)
          - **ARM64 APK**: `Awery-*-arm64-v8a.apk` - For modern 64-bit ARM devices (most common)
          - **ARM32 APK**: `Awery-*-armeabi-v7a.apk` - For older 32-bit ARM devices
          - **x86_64 APK**: `Awery-*-x86_64.apk` - For 64-bit x86 devices (emulators/tablets)
          - **x86 APK**: `Awery-*-x86.apk` - For 32-bit x86 devices
          - **AAB Bundle**: `Awery-*.aab` - For Google Play Store distribution
          
          #### Desktop
          - **Windows**: .exe, .msi installers
          - **Linux**: .deb, .rpm, .tar.gz packages
          - **macOS**: .dmg, .pkg installers
          
          ### 📋 Installation Instructions
          
          **Android**: 
          - Download the **Universal APK** if you're unsure which architecture to use
          - For smaller file size, download the architecture-specific APK for your device:
            - Most modern phones use **ARM64** (arm64-v8a)
            - Older phones use **ARM32** (armeabi-v7a)
          - Enable "Install from Unknown Sources" in your device settings
          - Install the APK file
          
          **Desktop**: Choose the appropriate package for your operating system.
          
          ### 🏗️ Architecture Guide
          
          Not sure which APK to download? Use the **Universal APK** - it works on all devices but is larger in size.
          
          For optimized downloads:
          - **arm64-v8a**: Samsung Galaxy S8+, Google Pixel 2+, OnePlus 5+, most devices from 2017+
          - **armeabi-v7a**: Older devices from before 2017
          
          ### 🔍 What's Changed
          
          See the commit history for detailed changes.
          
          ### ⚠️ Notes
          
          - Android APKs are unsigned by default
          - Desktop builds are not code-signed
          - First launch may take longer as the app initializes
          EOF
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          name: Awery ${{ steps.get_version.outputs.VERSION }}
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.VERSION, 'alpha') || contains(steps.get_version.outputs.VERSION, 'beta') || contains(steps.get_version.outputs.VERSION, 'dev') }}
          files: |
            release-artifacts/android-artifacts/*
            release-artifacts/desktop-linux-artifacts/*
            release-artifacts/desktop-windows-artifacts/*
            release-artifacts/desktop-macos-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate checksums
        run: |
          cd release-artifacts
          find . -type f \( -name "*.apk" -o -name "*.aab" -o -name "*.exe" -o -name "*.msi" -o -name "*.dmg" -o -name "*.deb" -o -name "*.rpm" \) -exec sha256sum {} \; > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload checksums
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          files: release-artifacts/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
