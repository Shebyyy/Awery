name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. v1.0.0)"
        required: false
        default: ""

env:
  APP_NAME: Awery

# =========================================================
# ANDROID (SIGNED)
# =========================================================
jobs:
  build-android:
    name: Build Android (Signed)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      VERSION: ${{ github.event.inputs.version != '' && github.event.inputs.version || github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Decode keystore
        run: |
          printf "%s" "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks
          ls -lah keystore.jks

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Build signed APK
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew :app:assembleRelease --stacktrace

      - name: Verify APK signature
        run: |
          $ANDROID_HOME/build-tools/*/apksigner verify \
            app/build/outputs/apk/release/*.apk

      - name: Collect & rename APKs
        run: |
          mkdir android-artifacts
          cp app/build/outputs/apk/release/*.apk android-artifacts/
          cd android-artifacts
          mv *.apk "$APP_NAME-$VERSION-android-release.apk"
          ls -lah

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: android-artifacts/

# =========================================================
# LINUX
# =========================================================
  build-linux:
    name: Build Desktop (Linux)
    runs-on: ubuntu-latest

    env:
      VERSION: ${{ github.event.inputs.version != '' && github.event.inputs.version || github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - run: chmod +x gradlew

      - name: Build Linux
        run: ./gradlew :app:packageDistributionForCurrentOS
        continue-on-error: true

      - name: Collect Linux artifacts
        run: |
          mkdir linux-artifacts
          find app/build/compose/binaries -type f \
            \( -name "*.deb" -o -name "*.rpm" -o -name "*.tar.gz" -o -name "*.AppImage" \) \
            -exec cp {} linux-artifacts/ \;

      - name: Rename Linux artifacts
        run: |
          cd linux-artifacts
          for f in *; do
            case "$f" in
              *.deb) mv "$f" "$APP_NAME-$VERSION-linux-x64.deb" ;;
              *.rpm) mv "$f" "$APP_NAME-$VERSION-linux-x64.rpm" ;;
              *.tar.gz) mv "$f" "$APP_NAME-$VERSION-linux-x64.tar.gz" ;;
              *.AppImage) mv "$f" "$APP_NAME-$VERSION-linux-x64.AppImage" ;;
            esac
          done

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: linux-artifacts/

# =========================================================
# WINDOWS
# =========================================================
  build-windows:
    name: Build Desktop (Windows)
    runs-on: windows-latest

    env:
      VERSION: ${{ github.event.inputs.version != '' && github.event.inputs.version || github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Build Windows
        run: ./gradlew :app:packageDistributionForCurrentOS
        shell: bash
        continue-on-error: true

      - name: Collect Windows artifacts
        shell: powershell
        run: |
          mkdir windows-artifacts
          Get-ChildItem app/build/compose/binaries -Recurse -Include *.exe,*.msi |
            Copy-Item -Destination windows-artifacts

      - name: Rename Windows artifacts
        shell: powershell
        run: |
          Get-ChildItem windows-artifacts | ForEach-Object {
            if ($_.Extension -eq ".exe") {
              Rename-Item $_ "$env:APP_NAME-$env:VERSION-windows-x64.exe"
            }
            if ($_.Extension -eq ".msi") {
              Rename-Item $_ "$env:APP_NAME-$env:VERSION-windows-x64.msi"
            }
          }

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: windows-artifacts/

# =========================================================
# MACOS
# =========================================================
  build-macos:
    name: Build Desktop (macOS)
    runs-on: macos-latest

    env:
      VERSION: ${{ github.event.inputs.version != '' && github.event.inputs.version || github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - run: chmod +x gradlew

      - name: Build macOS
        run: ./gradlew :app:packageDistributionForCurrentOS
        continue-on-error: true

      - name: Collect macOS artifacts
        run: |
          mkdir macos-artifacts
          find app/build/compose/binaries -type f \
            \( -name "*.dmg" -o -name "*.pkg" \) \
            -exec cp {} macos-artifacts/ \;

      - name: Rename macOS artifacts
        run: |
          cd macos-artifacts
          for f in *; do
            [[ "$f" == *.dmg ]] && mv "$f" "$APP_NAME-$VERSION-macos-x64.dmg"
            [[ "$f" == *.pkg ]] && mv "$f" "$APP_NAME-$VERSION-macos-x64.pkg"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: macos-artifacts/

# =========================================================
# RELEASE
# =========================================================
  release:
    name: Create GitHub Release
    needs: [build-android, build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      VERSION: ${{ github.event.inputs.version != '' && github.event.inputs.version || github.ref_name }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Generate checksums
        run: |
          cd release-artifacts
          find . -type f -exec sha256sum {} \; > SHA256SUMS.txt

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Awery ${{ env.VERSION }}
          files: |
            release-artifacts/**/*
            release-artifacts/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
