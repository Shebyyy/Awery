name: Build & Release (new)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        default: ''

env:
  APP_NAME: Awery

jobs:
# =========================
# ANDROID
# =========================
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      VERSION: ${{ github.event.inputs.version != '' && github.event.inputs.version || github.ref_name }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - run: chmod +x gradlew

      - name: Build APKs
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Collect APKs
        run: |
          mkdir -p android-artifacts
          find app/build/outputs/apk -name "*.apk" -exec cp {} android-artifacts/ \;
          ls -lah android-artifacts

      - name: Rename APKs
        run: |
          cd android-artifacts
          VERSION="${VERSION:-dev-$(date +%Y%m%d)}"

          for f in *.apk; do
            if [[ "$f" == *"release"* ]]; then
              mv "$f" "$APP_NAME-$VERSION-android-release.apk"
            elif [[ "$f" == *"arm64-v8a"* ]]; then
              mv "$f" "$APP_NAME-$VERSION-android-arm64-v8a.apk"
            elif [[ "$f" == *"armeabi-v7a"* ]]; then
              mv "$f" "$APP_NAME-$VERSION-android-armeabi-v7a.apk"
            elif [[ "$f" == *"x86_64"* ]]; then
              mv "$f" "$APP_NAME-$VERSION-android-x86_64.apk"
            elif [[ "$f" == *"x86"* ]]; then
              mv "$f" "$APP_NAME-$VERSION-android-x86.apk"
            fi
          done

          ls -lah

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: android-artifacts/

# =========================
# LINUX
# =========================
  build-linux:
    name: Build Desktop (Linux)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      VERSION: ${{ github.event.inputs.version != '' && github.event.inputs.version || github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - run: chmod +x gradlew

      - name: Build Linux
        run: ./gradlew :app:packageDistributionForCurrentOS
        continue-on-error: true

      - name: Collect Linux Artifacts
        run: |
          mkdir -p linux-artifacts
          find app/build/compose/binaries -type f \
            \( -name "*.deb" -o -name "*.rpm" -o -name "*.tar.gz" -o -name "*.AppImage" \) \
            -exec cp {} linux-artifacts/ \;

      - name: Rename Linux Artifacts
        run: |
          cd linux-artifacts
          VERSION="${VERSION:-dev-$(date +%Y%m%d)}"

          for f in *; do
            case "$f" in
              *.deb) mv "$f" "$APP_NAME-$VERSION-linux-x64.deb" ;;
              *.rpm) mv "$f" "$APP_NAME-$VERSION-linux-x64.rpm" ;;
              *.tar.gz) mv "$f" "$APP_NAME-$VERSION-linux-x64.tar.gz" ;;
              *.AppImage) mv "$f" "$APP_NAME-$VERSION-linux-x64.AppImage" ;;
            esac
          done

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: linux-artifacts/

# =========================
# WINDOWS
# =========================
  build-windows:
    name: Build Desktop (Windows)
    runs-on: windows-latest
    permissions:
      contents: write

    env:
      VERSION: ${{ github.event.inputs.version != '' && github.event.inputs.version || github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Build Windows
        run: ./gradlew :app:packageDistributionForCurrentOS
        shell: bash
        continue-on-error: true

      - name: Collect Windows Artifacts
        run: |
          mkdir desktop-windows-artifacts
          Get-ChildItem app/build/compose/binaries -Recurse -Include *.exe,*.msi |
            Copy-Item -Destination desktop-windows-artifacts
        shell: powershell

      - name: Rename Windows Artifacts
        run: |
          $VERSION = "${{ env.VERSION }}"
          if ($VERSION -eq "") { $VERSION = "dev-$(Get-Date -Format yyyyMMdd)" }

          Get-ChildItem desktop-windows-artifacts | ForEach-Object {
            if ($_.Extension -eq ".exe") {
              Rename-Item $_ "$env:APP_NAME-$VERSION-windows-x64.exe"
            }
            if ($_.Extension -eq ".msi") {
              Rename-Item $_ "$env:APP_NAME-$VERSION-windows-x64.msi"
            }
          }
        shell: powershell

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: desktop-windows-artifacts/

# =========================
# MACOS
# =========================
  build-macos:
    name: Build Desktop (macOS)
    runs-on: macos-latest
    permissions:
      contents: write

    env:
      VERSION: ${{ github.event.inputs.version != '' && github.event.inputs.version || github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - run: chmod +x gradlew

      - name: Build macOS
        run: ./gradlew :app:packageDistributionForCurrentOS
        continue-on-error: true

      - name: Collect macOS Artifacts
        run: |
          mkdir macos-artifacts
          find app/build/compose/binaries -type f \
            \( -name "*.dmg" -o -name "*.pkg" \) \
            -exec cp {} macos-artifacts/ \;

      - name: Rename macOS Artifacts
        run: |
          cd macos-artifacts
          VERSION="${VERSION:-dev-$(date +%Y%m%d)}"

          for f in *; do
            [[ "$f" == *.dmg ]] && mv "$f" "$APP_NAME-$VERSION-macos-x64.dmg"
            [[ "$f" == *.pkg ]] && mv "$f" "$APP_NAME-$VERSION-macos-x64.pkg"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: macos-artifacts/

# =========================
# RELEASE
# =========================
  release:
    name: Create GitHub Release
    needs: [build-android, build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      VERSION: ${{ github.event.inputs.version != '' && github.event.inputs.version || github.ref_name }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create checksums
        run: |
          cd release-artifacts
          find . -type f -exec sha256sum {} \; > SHA256SUMS.txt

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Awery ${{ env.VERSION }}
          files: |
            release-artifacts/**/*
            release-artifacts/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
