name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        default: ''

jobs:
  build-android:
    name: Build Android APKs
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Android Release APK
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Build Android Universal APK
        run: ./gradlew :app:assembleUniversalRelease --stacktrace
        continue-on-error: true

      - name: Build Android Split APKs
        run: |
          # Enable ABI splits for architecture-specific APKs
          ./gradlew :app:assembleRelease \
            -Pandroid.enableR8=true \
            -Pandroid.splits.abi.enable=true \
            -Pandroid.splits.abi.include="arm64-v8a,armeabi-v7a,x86,x86_64" \
            --stacktrace
        continue-on-error: true

      - name: Collect Android artifacts
        run: |
          mkdir -p android-artifacts
          find app/build/outputs/apk -name "*.apk" -type f -exec cp {} android-artifacts/ \;
          ls -lah android-artifacts/

      - name: Rename APKs with version and platform
        run: |
          cd android-artifacts
          VERSION="${GITHUB_REF#refs/tags/}"
          if [ -z "$VERSION" ]; then
            VERSION="${{ github.event.inputs.version }}"
          fi
          if [ -z "$VERSION" ]; then
            VERSION="dev-$(date +%Y%m%d)"
          fi
          
          # Rename files with clear naming convention
          for file in *.apk; do
            if [ -f "$file" ]; then
              if [[ "$file" == *"universal"* ]]; then
                mv "$file" "Awery-${VERSION}-android-universal.apk"
              elif [[ "$file" == *"arm64-v8a"* ]]; then
                mv "$file" "Awery-${VERSION}-android-arm64-v8a.apk"
              elif [[ "$file" == *"armeabi-v7a"* ]]; then
                mv "$file" "Awery-${VERSION}-android-armeabi-v7a.apk"
              elif [[ "$file" == *"x86"* ]]; then
                mv "$file" "Awery-${VERSION}-android-x86.apk"
              elif [[ "$file" == *"x86_64"* ]]; then
                mv "$file" "Awery-${VERSION}-android-x86_64.apk"
              elif [[ "$file" == *"release"* ]]; then
                mv "$file" "Awery-${VERSION}-android-release.apk"
              else
                mv "$file" "Awery-${VERSION}-android-${file}"
              fi
            fi
          done
          
          ls -lah

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: android-artifacts/
          retention-days: 7

  build-desktop-linux:
    name: Build Desktop (Linux)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Desktop Linux
        run: ./gradlew :app:packageDistributionForCurrentOS --stacktrace

      - name: Create Linux package variants
        run: |
          ./gradlew :app:packageDeb --stacktrace || echo "Deb packaging not available"
          ./gradlew :app:packageRpm --stacktrace || echo "RPM packaging not available"
        continue-on-error: true

      - name: Collect Linux artifacts
        run: |
          mkdir -p desktop-linux-artifacts
          find app/build/compose/binaries -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.tar.gz" \) -exec cp {} desktop-linux-artifacts/ \;
          find app/build/compose/jars -name "*.jar" -type f -exec cp {} desktop-linux-artifacts/ \;
          ls -lah desktop-linux-artifacts/

      - name: Rename Linux artifacts with version
        run: |
          cd desktop-linux-artifacts
          VERSION="${GITHUB_REF#refs/tags/}"
          if [ -z "$VERSION" ]; then
            VERSION="${{ github.event.inputs.version }}"
          fi
          if [ -z "$VERSION" ]; then
            VERSION="dev-$(date +%Y%m%d)"
          fi
          
          for file in *; do
            if [ -f "$file" ]; then
              if [[ "$file" == *.deb ]]; then
                mv "$file" "Awery-${VERSION}-linux-x64.deb"
              elif [[ "$file" == *.rpm ]]; then
                mv "$file" "Awery-${VERSION}-linux-x64.rpm"
              elif [[ "$file" == *.tar.gz ]]; then
                mv "$file" "Awery-${VERSION}-linux-x64.tar.gz"
              elif [[ "$file" == *.jar ]]; then
                mv "$file" "Awery-${VERSION}-linux-x64.jar"
              fi
            fi
          done
          
          ls -lah

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-artifacts
          path: desktop-linux-artifacts/
          retention-days: 7

  build-desktop-windows:
    name: Build Desktop (Windows)
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Desktop Windows
        run: ./gradlew :app:packageDistributionForCurrentOS --stacktrace
        shell: bash

      - name: Create Windows installer
        run: ./gradlew :app:packageMsi --stacktrace || echo "MSI packaging not available"
        shell: bash
        continue-on-error: true

      - name: Collect Windows artifacts
        run: |
          mkdir -p desktop-windows-artifacts
          Get-ChildItem -Path app/build/compose/binaries -Recurse -Include *.exe,*.msi,*.zip | Copy-Item -Destination desktop-windows-artifacts/
          Get-ChildItem desktop-windows-artifacts/
        shell: powershell

      - name: Rename Windows artifacts with version
        run: |
          cd desktop-windows-artifacts
          VERSION="${{ env.GITHUB_REF }}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$GITHUB_REF" ]; then
            VERSION="${{ github.event.inputs.version }}"
          fi
          if [ -z "$VERSION" ]; then
            VERSION="dev-$(date +%Y%m%d)"
          fi
          VERSION="${VERSION#refs/tags/}"
          
          powershell -Command "
          Get-ChildItem -Path '.' -File | ForEach-Object {
            \$file = \$_.Name
            if (\$file -like '*.exe') {
              Rename-Item -Path \$file -NewName \"Awery-$VERSION-windows-x64.exe\"
            } elseif (\$file -like '*.msi') {
              Rename-Item -Path \$file -NewName \"Awery-$VERSION-windows-x64.msi\"
            } elseif (\$file -like '*.zip') {
              Rename-Item -Path \$file -NewName \"Awery-$VERSION-windows-x64.zip\"
            }
          }
          "
          
          Get-ChildItem
        shell: powershell

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-artifacts
          path: desktop-windows-artifacts/
          retention-days: 7

  build-desktop-macos:
    name: Build Desktop (macOS)
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Desktop macOS
        run: ./gradlew :app:packageDistributionForCurrentOS --stacktrace

      - name: Create macOS DMG
        run: ./gradlew :app:packageDmg --stacktrace || echo "DMG packaging not available"
        continue-on-error: true

      - name: Collect macOS artifacts
        run: |
          mkdir -p desktop-macos-artifacts
          find app/build/compose/binaries -type f \( -name "*.dmg" -o -name "*.pkg" -o -name "*.tar.gz" \) -exec cp {} desktop-macos-artifacts/ \;
          ls -lah desktop-macos-artifacts/

      - name: Rename macOS artifacts with version
        run: |
          cd desktop-macos-artifacts
          VERSION="${GITHUB_REF#refs/tags/}"
          if [ -z "$VERSION" ]; then
            VERSION="${{ github.event.inputs.version }}"
          fi
          if [ -z "$VERSION" ]; then
            VERSION="dev-$(date +%Y%m%d)"
          fi
          
          for file in *; do
            if [ -f "$file" ]; then
              if [[ "$file" == *.dmg ]]; then
                mv "$file" "Awery-${VERSION}-macos-x64.dmg"
              elif [[ "$file" == *.pkg ]]; then
                mv "$file" "Awery-${VERSION}-macos-x64.pkg"
              elif [[ "$file" == *.tar.gz ]]; then
                mv "$file" "Awery-${VERSION}-macos-x64.tar.gz"
              fi
            fi
          done
          
          ls -lah

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos-artifacts
          path: desktop-macos-artifacts/
          retention-days: 7

  create-release:
    name: Create GitHub Release
    needs: [build-android, build-desktop-linux, build-desktop-windows, build-desktop-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Display artifact structure
        run: |
          ls -R release-artifacts/

      - name: Get version from tag or input
        id: get_version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$GITHUB_REF" ]; then
            VERSION="${{ github.event.inputs.version }}"
          fi
          if [ -z "$VERSION" ]; then
            VERSION="dev-$(date +%Y%m%d-%H%M%S)"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

      - name: Generate release notes
        id: release_notes
        run: |
          cat << EOF > release_notes.md
          ## Awery ${{ steps.get_version.outputs.VERSION }}
          
          ### 📦 Available Downloads
          
          #### Android
          - **Universal APK**: Compatible with all Android devices
          - **Release APK**: Standard release build
          - **Split APKs**: Architecture-specific builds (ARM64, ARMv7, x86, x86_64)
          
          #### Desktop
          - **Windows**: .exe installer and .msi package
          - **Linux**: .deb, .rpm packages and .tar.gz archive
          - **macOS**: .dmg disk image and .pkg installer
          
          ### 📋 Installation Instructions
          
          **Android**: 
          - Download and install the universal APK for compatibility with all devices
          - Use split APKs for smaller downloads targeting specific architectures
          
          **Desktop**: 
          - Windows: Run the .exe installer or use the .msi package
          - Linux: Install the .deb (Debian/Ubuntu) or .rpm (RedHat/Fedora) package
          - macOS: Open the .dmg file and drag to Applications, or use the .pkg installer
          
          ### 🔍 What's Changed
          
          See the commit history for detailed changes since the last release.
          
          ### ⚠️ Notes
          
          - Android APKs are unsigned unless configured with signing keys
          - Desktop builds are not code-signed
          - Always verify checksums before installation
          - Report any issues on the GitHub repository
          EOF
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          name: Awery ${{ steps.get_version.outputs.VERSION }}
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.VERSION, 'alpha') || contains(steps.get_version.outputs.VERSION, 'beta') || contains(steps.get_version.outputs.VERSION, 'dev') }}
          files: |
            release-artifacts/android-artifacts/*
            release-artifacts/desktop-linux-artifacts/*
            release-artifacts/desktop-windows-artifacts/*
            release-artifacts/desktop-macos-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate checksums
        run: |
          cd release-artifacts
          find . -type f \( -name "*.apk" -o -name "*.exe" -o -name "*.msi" -o -name "*.dmg" -o -name "*.deb" -o -name "*.rpm" -o -name "*.pkg" -o -name "*.tar.gz" -o -name "*.jar" \) -exec sha256sum {} \; > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload checksums to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          files: release-artifacts/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
